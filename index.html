<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TM Phase 2</title>
    <style>
        body { background: #000; color: #00d4ff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; transition: background 0.4s; overflow: hidden; }
        #mic-btn { width: 220px; height: 220px; border-radius: 50%; border: 8px solid #222; background: #111; color: #00d4ff; font-size: 20px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); -webkit-tap-highlight-color: transparent; }
        .active { border-color: #00d4ff; animation: pulse 1.5s infinite; }
        #status { margin-top: 40px; text-align: center; color: #666; font-size: 14px; padding: 0 30px; min-height: 4em; line-height: 1.4; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(0,212,255,0.4); } 70% { box-shadow: 0 0 0 25px rgba(0,212,255,0); } 100% { box-shadow: 0 0 0 0 rgba(0,212,255,0); } }
    </style>
</head>
<body>
    <button id="mic-btn">TAP TO START</button>
    <div id="status">Ready</div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwK6EUlb8FoNQUrpQ7h5h_tOmHdUMi9uezB-QcCH8juki6dYzwWNMRK_a5MJ-7A3Wsx/exec"; 
        const TOKEN = "2manypplTALK!!!";

        const btn = document.getElementById('mic-btn');
        const status = document.getElementById('status');
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        const synth = window.speechSynthesis;

        // Helper: Speak and wait for it to finish
        const speak = (msg) => {
            return new Promise(resolve => {
                const utter = new SpeechSynthesisUtterance(msg);
                utter.onend = resolve;
                synth.speak(utter);
            });
        };

        // Helper: Listen for a single voice response
        const listen = () => {
            return new Promise((resolve, reject) => {
                const rec = new Speech();
                rec.start();
                rec.onresult = (e) => resolve(e.results[0][0].transcript);
                rec.onerror = (e) => reject(e);
                setTimeout(() => resolve("timeout"), 8000);
            });
        };

        btn.onclick = async () => {
            try {
                btn.classList.add('active');
                status.innerText = "Listening...";
                btn.innerText = "LISTENING...";
                
                const rawInput = await listen();
                btn.classList.remove('active');

                if (rawInput === "timeout" || rawInput.length < 2) {
                    status.innerText = "Didn't catch that.";
                    btn.innerText = "TAP TO START";
                    return;
                }

                btn.innerText = "THINKING...";
                status.innerText = `Heard: "${rawInput}"`;

                // STEP 1: Get Gemini's intent analysis
                const suggestRes = await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: "suggest", text: rawInput, token: TOKEN })
                });
                let sug = await suggestRes.json();

                if (sug.error) throw new Error(sug.error);

                // STEP 2: Handle "UPDATE" (Completion) vs "CREATE" (New Task)
                if (sug.intent === "UPDATE") {
                    btn.innerText = "MATCHING...";
                    const commitRes = await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: "commit", token: TOKEN, taskData: sug })
                    });
                    let result = await commitRes.json();

                    // AMBIGUITY LOOP: If more than one match found
                    if (result.status === "need_clarification") {
                        await speak(result.message);
                        btn.innerText = "WHICH ONE?";
                        btn.classList.add('active');
                        
                        const choice = await listen();
                        btn.classList.remove('active');

                        // Re-submit with the specific choice
                        sug.confirm_text = choice; 
                        btn.innerText = "UPDATING...";
                        const finalRes = await fetch(GAS_URL, {
                            method: 'POST',
                            body: JSON.stringify({ action: "commit", token: TOKEN, taskData: sug })
                        });
                        result = await finalRes.json();
                    }

                    status.innerText = result.action === "updated" ? `Updated: ${result.task}` : "Task Created Instead";
                    await speak(result.action === "updated" ? "Task complete." : "Created new task.");

                } else {
                    // STEP 3: Handle Standard CREATE flow
                    const confirmMsg = `${sug.confirm_text}. ${sug.category}, ${sug.time} minutes. Yes?`;
                    await speak(confirmMsg);

                    btn.innerText = "YES / NO?";
                    btn.classList.add('active');
                    const choiceText = (await listen()).toLowerCase();
                    btn.classList.remove('active');

                    const finalStatus = choiceText.includes("yes") ? "Pending" : "Review";
                    btn.innerText = "SAVING...";

                    await fetch(GAS_URL, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            action: "commit", 
                            token: TOKEN, 
                            taskData: { ...sug, name: rawInput, status: finalStatus }
                        })
                    });

                    status.innerText = "Saved as: " + finalStatus;
                    if (window.navigator.vibrate) navigator.vibrate(50);
                }

                btn.innerText = "TAP TO START";

            } catch (err) {
                status.innerText = "Error: " + err.message;
                btn.innerText = "RETRY";
                console.error(err);
            }
        };
    </script>
</body>
</html>
